<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

        <!-- Header -->
        <h2 class="text-2xl font-bold text-gray-800 mb-1">Create an Account</h2>
        <p class="text-sm text-gray-500 mb-6 border-b pb-4">Join your school's lost-and-found & trading community.</p>

        <form action="/register" method="POST" enctype="multipart/form-data" id="register-form" class="space-y-4" novalidate>

            <!-- Profile Photo -->
            <div class="flex flex-col items-center gap-2">
                <div class="relative group cursor-pointer" id="photo-wrapper">
                    <img id="photo-preview"
                         src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'%3E%3Ccircle cx='40' cy='40' r='40' fill='%23e5e7eb'/%3E%3Ccircle cx='40' cy='32' r='14' fill='%239ca3af'/%3E%3Cellipse cx='40' cy='68' rx='22' ry='16' fill='%239ca3af'/%3E%3C/svg%3E"
                         alt="Profile preview"
                         class="w-20 h-20 rounded-full object-cover border-2 border-gray-200 group-hover:border-blue-400 transition">
                    <div class="absolute inset-0 rounded-full bg-black/30 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                        <span class="text-white text-xs font-medium">Change</span>
                    </div>
                </div>
                <label for="profile_photo" class="text-xs text-blue-600 hover:underline cursor-pointer font-medium">Upload photo</label>
                <input type="file" id="profile_photo" name="profile_photo" accept="image/*" class="hidden">
                <p class="text-xs text-gray-400">Optional · JPG, PNG up to 2 MB</p>
            </div>

            <!-- Full Name -->
            <div>
                <label for="full_name" class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                <input type="text" id="full_name" name="full_name" required placeholder="e.g. Maria Grech"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <!-- Email + Role Badge -->
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">School Email</label>
                <input type="email" id="email" name="email" required placeholder="you@school.edu"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                <!-- Role feedback -->
                <div id="role-feedback" class="mt-2 hidden">
                    <span id="role-badge" class="inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full"></span>
                </div>
                <p id="email-error" class="mt-1 text-xs text-red-500 hidden">This email domain isn't recognised. Please use your school email.</p>
            </div>

            <!-- School / Institution -->
            <div>
                <label for="institution" class="block text-sm font-semibold text-gray-700 mb-1">School / Institution</label>
                <input type="text" id="institution" name="institution" required placeholder="e.g. St. Edward's College"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <!-- Student / Staff ID -->
            <div>
                <label for="user_id" class="block text-sm font-semibold text-gray-700 mb-1">
                    <span id="id-label">Student / Staff ID</span>
                </label>
                <input type="text" id="user_id" name="user_id" required placeholder="e.g. STU-2024-00123"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required placeholder="At least 8 characters"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition pr-10">
                    <button type="button" id="toggle-password" tabindex="-1"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <!-- Password strength bar -->
                <div class="mt-2 h-1 rounded-full bg-gray-100 overflow-hidden">
                    <div id="strength-bar" class="h-full rounded-full transition-all duration-300 w-0"></div>
                </div>
                <p id="strength-label" class="text-xs text-gray-400 mt-1"></p>
            </div>

            <!-- Confirm Password -->
            <div>
                <label for="confirm_password" class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repeat your password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                <p id="password-match-error" class="mt-1 text-xs text-red-500 hidden">Passwords don't match.</p>
            </div>

            <!-- Hidden role field -->
            <input type="hidden" id="role" name="role" value="">

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg shadow transition duration-200 mt-2 cursor-pointer">
                Create Account
            </button>

            <p class="text-center text-sm text-gray-500">
                Already have an account? <a href="/login" class="text-blue-600 hover:underline font-medium">Sign in</a>
            </p>

        </form>
    </div>

    <script>
        // ── Config: map email domains → roles ──────────────────────────────────
        // Update these to match your actual school domains.
        const DOMAIN_ROLES = {
            "student.school.edu": "student",
            "school.edu":         "teacher",
            // add more domains here as needed
        };

        const ROLE_STYLE = {
            student: { label: "Student",  classes: "bg-blue-100 text-blue-700",  icon: "🎓", idPlaceholder: "e.g. STU-2024-00123", idLabel: "Student ID" },
            teacher: { label: "Teacher",  classes: "bg-green-100 text-green-700", icon: "📖", idPlaceholder: "e.g. STF-0045",        idLabel: "Staff ID"   },
        };

        // ── Email → role detection ─────────────────────────────────────────────
        const emailInput    = document.getElementById("email");
        const roleBadge     = document.getElementById("role-badge");
        const roleFeedback  = document.getElementById("role-feedback");
        const emailError    = document.getElementById("email-error");
        const roleHidden    = document.getElementById("role");
        const idLabel       = document.getElementById("id-label");
        const userIdInput   = document.getElementById("user_id");

        emailInput.addEventListener("input", () => {
            const email  = emailInput.value.trim();
            const domain = email.split("@")[1] || "";
            const role   = DOMAIN_ROLES[domain];

            if (!domain || !email.includes("@")) {
                roleFeedback.classList.add("hidden");
                emailError.classList.add("hidden");
                roleHidden.value = "";
                return;
            }

            if (role) {
                const style = ROLE_STYLE[role];
                roleBadge.textContent  = `${style.icon} Detected role: ${style.label}`;
                roleBadge.className    = `inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full ${style.classes}`;
                roleFeedback.classList.remove("hidden");
                emailError.classList.add("hidden");
                roleHidden.value       = role;
                idLabel.textContent    = style.idLabel;
                userIdInput.placeholder = style.idPlaceholder;
            } else {
                roleFeedback.classList.add("hidden");
                emailError.classList.remove("hidden");
                roleHidden.value = "";
            }
        });

        // ── Profile photo preview ──────────────────────────────────────────────
        const photoInput   = document.getElementById("profile_photo");
        const photoPreview = document.getElementById("photo-preview");
        const photoWrapper = document.getElementById("photo-wrapper");

        photoWrapper.addEventListener("click", () => photoInput.click());
        photoInput.addEventListener("change", () => {
            const file = photoInput.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                alert("Photo must be under 2 MB.");
                photoInput.value = "";
                return;
            }
            const reader = new FileReader();
            reader.onload = e => { photoPreview.src = e.target.result; };
            reader.readAsDataURL(file);
        });

        // ── Password visibility toggle ─────────────────────────────────────────
        document.getElementById("toggle-password").addEventListener("click", () => {
            const pwd = document.getElementById("password");
            pwd.type  = pwd.type === "password" ? "text" : "password";
        });

        // ── Password strength ──────────────────────────────────────────────────
        const strengthBar   = document.getElementById("strength-bar");
        const strengthLabel = document.getElementById("strength-label");

        document.getElementById("password").addEventListener("input", function () {
            const v = this.value;
            let score = 0;
            if (v.length >= 8)              score++;
            if (/[A-Z]/.test(v))            score++;
            if (/[0-9]/.test(v))            score++;
            if (/[^A-Za-z0-9]/.test(v))     score++;

            const map = [
                { w: "0%",   color: "",                   text: "" },
                { w: "25%",  color: "bg-red-400",         text: "Weak" },
                { w: "50%",  color: "bg-yellow-400",      text: "Fair" },
                { w: "75%",  color: "bg-blue-400",        text: "Good" },
                { w: "100%", color: "bg-green-500",       text: "Strong" },
            ];
            const s = map[score] || map[0];
            strengthBar.style.width = s.w;
            strengthBar.className   = `h-full rounded-full transition-all duration-300 ${s.color}`;
            strengthLabel.textContent = s.text;
        });

        // ── Confirm password match ─────────────────────────────────────────────
        document.getElementById("confirm_password").addEventListener("input", function () {
            const pwd  = document.getElementById("password").value;
            const err  = document.getElementById("password-match-error");
            err.classList.toggle("hidden", this.value === "" || this.value === pwd);
        });

        // ── Form submit guard ──────────────────────────────────────────────────
        document.getElementById("register-form").addEventListener("submit", function (e) {
            const pwd  = document.getElementById("password").value;
            const conf = document.getElementById("confirm_password").value;
            if (pwd !== conf) {
                e.preventDefault();
                document.getElementById("password-match-error").classList.remove("hidden");
            }
            if (!roleHidden.value) {
                e.preventDefault();
                emailError.classList.remove("hidden");
                emailInput.focus();
            }
        });
    </script>
</body>
</html>
